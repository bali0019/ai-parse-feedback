# Databricks Asset Bundle for AI Parse Feedback App
# Requires Databricks CLI v0.278.0 or later

bundle:
  name: ai-parse-feedback

# Sync configuration - exclude local dev files from upload
sync:
  exclude:
    - .venv/
    - venv/
    - env/
    - node_modules/
    - frontend/src/
    - frontend/node_modules/
    - __pycache__/
    - "*.pyc"
    - "*.pyo"
    - .idea/
    - .vscode/
    - .databricks/
    - .DS_Store
    - "*.log"
    - .git/
    - .gitignore
    - "*.egg-info/"
    - CLAUDE.md
    - backend/tests/
    - backend/.venv/
    - backend/pytest.ini
    - frontend/vitest.config.ts
    - frontend/tsconfig.node.json
    - frontend/public/

# Variables for customization
variables:
  catalog:
    description: "Unity Catalog catalog name (set in .env or via --var)"
    default: my_catalog
  schema:
    description: "Unity Catalog schema name (set in .env or via --var)"
    default: default

  sql_warehouse_id:
    description: "SQL Warehouse ID for ai_parse_document execution (set in .env)"
    default: ""

  database_instance_name:
    description: "Lakebase database instance name"
    default: "ai-parse-feedback-db"
  database_name:
    description: "Lakebase database name"
    default: "ai-parse-feedback-db"

# Resources
resources:
  # Unity Catalog volumes
  volumes:
    # Volume for uploaded source documents (PDFs, images)
    source_volume:
      name: parse_feedback_source
      catalog_name: ${var.catalog}
      schema_name: ${var.schema}
      volume_type: MANAGED
      comment: "Source documents for AI Parse Feedback review"

    # Volume for ai_parse_document page images output
    image_output_volume:
      name: parse_feedback_images
      catalog_name: ${var.catalog}
      schema_name: ${var.schema}
      volume_type: MANAGED
      comment: "Page images generated by ai_parse_document"

  # Serverless job for background export/import
  jobs:
    export_import_job:
      name: ai-parse-feedback-export
      description: "Background export/import for document bundles"
      environments:
        - environment_key: Default
          spec:
            client: "4"
            dependencies:
              - databricks-sdk>=0.61.0
              - psycopg2-binary
              - requests
              - Pillow
      tasks:
        - task_key: process
          notebook_task:
            notebook_path: ./jobs/export_import_spark.py
            source: WORKSPACE
          environment_key: Default
      parameters:
        - name: action
          default: "export"
        - name: document_ids
          default: ""
        - name: input_path
          default: ""
        - name: output_path
          default: ""
        - name: lakebase_instance
          default: "ai-parse-feedback-db"
        - name: catalog
          default: "${var.catalog}"
        - name: schema
          default: "${var.schema}"
      max_concurrent_runs: 10

  # Lakebase database instance (DAB-managed)
  database_instances:
    ai_parse_feedback_db:
      name: ai-parse-feedback-db
      capacity: CU_1

  # App definition
  apps:
    ai_parse_feedback_app:
      name: ai-parse-feedback
      description: "Human-in-the-loop review of ai_parse_document results with bounding box feedback"
      source_code_path: .

      # App resources - grant permissions and inject environment variables
      resources:
        # Source documents volume
        - name: source-volume
          description: "UC volume for uploaded document storage"
          uc_securable:
            securable_full_name: "${var.catalog}.${var.schema}.${resources.volumes.source_volume.name}"
            securable_type: "VOLUME"
            permission: "WRITE_VOLUME"

        # Page images volume
        - name: image-output-volume
          description: "UC volume for ai_parse_document page images"
          uc_securable:
            securable_full_name: "${var.catalog}.${var.schema}.${resources.volumes.image_output_volume.name}"
            securable_type: "VOLUME"
            permission: "WRITE_VOLUME"

        # SQL Warehouse for ai_parse_document execution
        - name: parse-warehouse
          description: "SQL Warehouse for ai_parse_document execution"
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: "CAN_USE"

        # Lakebase database for documents and feedback storage
        # NOTE: Auto-injects PGHOST, PGPORT, PGUSER, PGDATABASE, PGSSLMODE env vars
        - name: database
          description: "Lakebase PostgreSQL database for document tracking and feedback"
          database:
            instance_name: ${var.database_instance_name}
            database_name: ${var.database_name}
            permission: "CAN_CONNECT_AND_CREATE"

        # Background export/import job
        - name: export-job
          description: "Background job for document export/import"
          job:
            id: ${resources.jobs.export_import_job.id}
            permission: "CAN_MANAGE_RUN"

# Deployment targets — override these with your workspace details
targets:
  dev:
    default: true
    workspace:
      host: https://your-workspace.cloud.databricks.com   # TODO: set your workspace URL
      profile: DEFAULT                                       # TODO: set your CLI profile
    variables:
      catalog: my_catalog      # TODO: set your catalog
      schema: default          # TODO: set your schema
